<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Links</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #121212, #1a1a2e);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .profile-container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .profile-img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid #00fff2;
      object-fit: cover;
    }
    h1 {
      font-size: 1.5rem;
      margin: 15px 0 5px 0;
    }
    p {
      color: #b3b3b3;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    .link-btn {
      display: block;
      background-color: #ffffff;
      color: #121212;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .link-btn:hover {
      transform: translateY(-3px);
      background-color: #00fff2;
      color: #121212;
      box-shadow: 0 6px 15px rgba(0, 255, 242, 0.4);
    }
  </style>
</head>
<body>

  <div class="profile-container">
    <!-- Replace with your own image URL -->
    <img class="profile-img" src="https://placeholder.com" alt="Profile Picture">
    <h1>@Vigneswar.Anne</h1>
    <p>Welcome to my online hub. Check out ways to reach me !</p>

    <!-- Update these links with your actual URLs -->
    <a href="./index.html" class="link-btn" target="_blank">🌐 Visit My Website</a>
    <a href="https://instagram.com" class="link-btn" target="_blank">📸 Follow on Instagram</a>
    <a href="mailto:sri.vigneswar@proton.me" class="link-btn" target="_blank">✉️ Contact Me</a>
  </div>

</body>
</html>
