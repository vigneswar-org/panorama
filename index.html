<script>
  function toggleCV(event) {
    if (event) event.stopPropagation();
    const content = document.getElementById('cvContent');
    const container = document.getElementById('cvContainer');
    const isActive = content.classList.contains('active');
    
    // Close contact if it's open
    const contactContent = document.getElementById('contactContent');
    const contactContainer = document.getElementById('contactContainer');
    if (contactContent.classList.contains('active')) {
      contactContent.classList.remove('active');
      contactContainer.classList.remove('pointer-events-auto');
      contactContainer.classList.add('pointer-events-none');
    }

    if (isActive) {
      content.classList.remove('active');
      container.classList.remove('pointer-events-auto');
      container.classList.add('pointer-events-none');
    } else {
      content.classList.add('active');
      container.classList.remove('pointer-events-none');
      container.classList.add('pointer-events-auto');
    }
  }

  function toggleContact(event) {
    if (event) event.stopPropagation(); 
    
    const content = document.getElementById('contactContent');
    const container = document.getElementById('contactContainer');
    const isActive = content.classList.contains('active');

    // Close CV if it's open
    const cvContent = document.getElementById('cvContent');
    const cvContainer = document.getElementById('cvContainer');
    if (cvContent.classList.contains('active')) {
      cvContent.classList.remove('active');
      cvContainer.classList.remove('pointer-events-auto');
      cvContainer.classList.add('pointer-events-none');
    }

    if (isActive) {
      content.classList.remove('active');
      container.classList.remove('pointer-events-auto');
      container.classList.add('pointer-events-none');
    } else {
      content.classList.add('active');
      container.classList.remove('pointer-events-none');
      container.classList.add('pointer-events-auto');
    }
  }

  // Refined Click-Away logic for both overlays
  document.addEventListener('click', function(e) {
    const cvContent = document.getElementById('cvContent');
    const cvContainer = document.getElementById('cvContainer');
    const contactContent = document.getElementById('contactContent');
    const contactContainer = document.getElementById('contactContainer');
    const trekkerNode = document.getElementById('trekkerNode');
    const cvToggleBtn = document.getElementById('cvToggleBtn');

    // CV Click-away: if active and click is outside the content area and not the button
    if (cvContent.classList.contains('active')) {
        if (!cvContent.contains(e.target) && !cvToggleBtn.contains(e.target)) {
            cvContent.classList.remove('active');
            cvContainer.classList.remove('pointer-events-auto');
            cvContainer.classList.add('pointer-events-none');
        }
    }
    
    // Contact Click-away: if active and click is outside content and not the trigger trekker
    if (contactContent.classList.contains('active')) {
        if (!contactContent.contains(e.target) && !trekkerNode.contains(e.target)) {
            contactContent.classList.remove('active');
            contactContainer.classList.remove('pointer-events-auto');
            contactContainer.classList.add('pointer-events-none');
        }
    }
  }, true); // Use capture phase to ensure it handles clicks accurately
</script>

<script data-purpose="mist-simulation">
  (function() {
    const canvas = document.getElementById('mistCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    
    const birdsCanvas = document.getElementById('birdsCanvas');
    const birdsCtx = birdsCanvas.getContext('2d', { alpha: true });

    const starCanvas = document.getElementById('starCanvas');
    const starCtx = starCanvas.getContext('2d');
    
    const cabinNode = document.getElementById('cabinNode');
    const trekkerNode = document.getElementById('trekkerNode');
    const flagNode = document.getElementById('flagNode');
    
    let width, height;
    let particles = [];
    let birds = [];
    let stars = [];
    let globalTime = 0;
    
    const BIRD_AVG_SPEED = 2.0; 
    const MAX_PARTICLE_SPEED = BIRD_AVG_SPEED / 2.0; 
    const MAX_WIND_VAL = 1.0;
    const MIN_WIND_VAL = 0.5;
    
    let frameCount = 0;
    let windIntensity = MIN_WIND_VAL;
    let targetWind = MIN_WIND_VAL;
    let isGusting = false;
    let gustDuration = 0;
    let nextGustTime = Math.random() * 200 + 200;
    
    let svgScaleX, svgScaleY, svgOffsetX, svgOffsetY;

    // Constellation parameters
    let wordPoints = [];
    let animationState = 'waiting'; 
    let animationTimer = 0;
    let currentWaitingLimit = 600; 
    let persistentStarsIndices = [];
    let willPersistent = false;

    const STATE_TIMES = {
      waiting: 600,     
      emerging: 300,    
      converging: 300,  
      holding: 240,     
      dispersing: 300,  
      lingering: 300,   
      fading: 180       
    };

    function resize() {
      width = canvas.width = birdsCanvas.width = starCanvas.width = window.innerWidth;
      height = canvas.height = birdsCanvas.height = starCanvas.height = window.innerHeight;
      
      const SVG_WIDTH = 1600;
      const SVG_HEIGHT = 800;
      const mountainHeightRatio = 0.9;
      const effectiveHeight = height * mountainHeightRatio;
      
      const scaleFitWidth = width / SVG_WIDTH;
      const scaleFitHeight = effectiveHeight / SVG_HEIGHT;
      const scale = Math.max(scaleFitWidth, scaleFitHeight);
      
      svgScaleX = svgScaleY = scale;
      svgOffsetX = (width - (SVG_WIDTH * scale)) / 2;
      svgOffsetY = height - (SVG_HEIGHT * scale);

      groundElements();
      generateWordPoints();
      initStars();
    }

    function getMountainBoundary(screenX) {
      const svgX = (screenX - svgOffsetX) / svgScaleX;
      let peakY = 800;

      const forestPixelY = height - getYOnForest((screenX / width));

      if (svgX < 350) peakY = Math.min(peakY, 650 - (svgX/350)*50);
      else if (svgX < 600) peakY = Math.min(peakY, 600);
      
      if (svgX >= 0 && svgX <= 800) {
        const t = (svgX - 100) / 700;
        const pY = Math.max(0, 550 - t*370);
        peakY = Math.min(peakY, pY);
      } 
      
      if (svgX > 800 && svgX <= 1600) {
        const t = (svgX - 800) / 800;
        const pY = 180 + t*620;
        peakY = Math.min(peakY, pY);
      }

      if (svgX >= 1250) {
        const t = (svgX - 1250) / 350;
        const pY = 320 + t*330;
        peakY = Math.min(peakY, pY);
      }

      const svgPixelY = svgOffsetY + (peakY * svgScaleY);
      return Math.min(svgPixelY, forestPixelY);
    }

    function generateWordPoints() {
      const offscreenCanvas = document.createElement('canvas');
      const offscreenCtx = offscreenCanvas.getContext('2d');
      offscreenCanvas.width = width;
      offscreenCanvas.height = height;
      
      const fontSize = Math.min(width * 0.1, 80);
      offscreenCtx.font = `bold ${fontSize}px "Playfair Display", serif`;
      offscreenCtx.textAlign = 'center';
      offscreenCtx.textBaseline = 'middle';
      offscreenCtx.fillText('VIGNESWAR', width / 2, height * 0.25);
      
      const imageData = offscreenCtx.getImageData(0, 0, width, height).data;
      wordPoints = [];
      const step = Math.max(2, Math.floor(fontSize / 20)); 
      
      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          const alpha = imageData[(y * width + x) * 4 + 3];
          if (alpha > 128) {
            wordPoints.push({ x, y });
          }
        }
      }
    }

    function getRandomSkyPos() {
      let sx, sy, mY;
      let attempts = 0;
      do {
        sx = Math.random() * width;
        sy = Math.random() * height;
        mY = getMountainBoundary(sx);
        attempts++;
      } while (sy > mY - 10 && attempts < 50); 
      return { x: sx, y: sy };
    }

    function initStars() {
      stars = [];
      const starCount = Math.max(wordPoints.length, 600);
      for (let i = 0; i < starCount; i++) {
        const pos = getRandomSkyPos();
        stars.push({
          x: pos.x,
          y: pos.y,
          targetX: 0,
          targetY: 0,
          originX: pos.x,
          originY: pos.y,
          size: Math.random() * 1.5 + 0.5,
          opacity: 0,
          twinkleSpeed: 0.05 + Math.random() * 0.1,
          isTwinkler: Math.random() > 0.2,
          hasTarget: false,
          isPersistent: false
        });
      }
      
      const indices = Array.from({length: stars.length}, (_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }

      for (let i = 0; i < wordPoints.length && i < stars.length; i++) {
        const s = stars[indices[i]];
        s.targetX = wordPoints[i].x;
        s.targetY = wordPoints[i].y;
        s.hasTarget = true;
      }
    }

    function updateStars() {
      animationTimer++;
      let limit = STATE_TIMES[animationState];
      if (animationState === 'waiting') limit = currentWaitingLimit;

      if (animationTimer >= limit) {
        animationTimer = 0;
        switch(animationState) {
          case 'waiting': 
            animationState = 'emerging'; 
            STATE_TIMES.emerging = Math.floor((Math.random() * 7 + 3) * 60); 
            willPersistent = Math.random() > 0.6;
            resetStarOrigins(); 
            break;
          case 'emerging': 
            animationState = 'converging'; 
            break;
          case 'converging': 
            animationState = 'holding'; 
            break;
          case 'holding': 
            animationState = 'dispersing'; 
            break;
          case 'dispersing': 
            animationState = 'lingering'; 
            STATE_TIMES.lingering = Math.floor((Math.random() * 6 + 4) * 60); 
            break;
          case 'lingering': 
            animationState = 'fading'; 
            break;
          case 'fading': 
            animationState = 'waiting'; 
            currentWaitingLimit = 600 + Math.floor(Math.random() * 600); 
            break;
        }
      }

      const progress = animationTimer / limit;

      stars.forEach((s, idx) => {
        const mountainY = getMountainBoundary(s.x);
        const isOccluded = s.y > mountainY - 2;

        if (animationState === 'waiting') {
          if (willPersistent && s.isPersistent && !isOccluded) {
              s.opacity = 0.5 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.3;
          } else {
              s.opacity = 0;
          }
          return;
        }

        let currentAlpha = 1.0;

        if (animationState === 'emerging') {
          s.x = s.originX;
          s.y = s.originY;
          currentAlpha = Math.min(progress * 1.5, 0.7 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.3);
        }
        else if (animationState === 'converging') {
          if (s.hasTarget) {
            s.x += (s.targetX - s.x) * 0.05;
            s.y += (s.targetY - s.y) * 0.05;
          }
          currentAlpha = (0.7 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.3);
        } 
        else if (animationState === 'holding') {
          if (s.hasTarget) {
            s.x = s.targetX;
            s.y = s.targetY;
          }
          currentAlpha = (0.8 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.2);
        } 
        else if (animationState === 'dispersing') {
          if (s.hasTarget) {
            s.x += (s.originX - s.x) * 0.03;
            s.y += (s.originY - s.y) * 0.03;
          }
          currentAlpha = (0.7 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.3);
        }
        else if (animationState === 'lingering') {
          s.x = s.originX;
          s.y = s.originY;
          currentAlpha = (0.7 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.3);
        }
        else if (animationState === 'fading') {
          const fadeOutFactor = (1 - progress);
          const targetOp = (0.7 + Math.sin(Date.now() * s.twinkleSpeed * 0.05) * 0.3);
          if (willPersistent && s.isPersistent) {
            currentAlpha = Math.max(0.4, targetOp * fadeOutFactor);
          } else {
            currentAlpha = Math.max(0, targetOp * fadeOutFactor);
          }
        }

        s.opacity = isOccluded ? 0 : currentAlpha;
      });
    }

    function resetStarOrigins() {
      stars.forEach((s, idx) => {
        const pos = getRandomSkyPos();
        s.originX = pos.x;
        s.originY = pos.y;
        s.x = pos.x;
        s.y = pos.y;
        s.isPersistent = false;
        if (pos.y < height * 0.15 && Math.random() < 0.1) {
          s.isPersistent = true;
        }
      });
    }

    function drawStars() {
      starCtx.clearRect(0, 0, width, height);
      stars.forEach(s => {
        if (s.opacity <= 0) return;
        starCtx.globalAlpha = s.opacity;
        starCtx.fillStyle = '#fff';
        starCtx.beginPath();
        starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        starCtx.fill();
      });
      starCtx.globalAlpha = 1;
    }

    function getYOnForest(xPercent) {
      let x = xPercent * 1000;
      let yInViewbox;
      if (x > 500) {
        let t = (x - 500) / 500;
        yInViewbox = (1-t)*(1-t)*180 + 2*(1-t)*t*220 + t*t*200;
      } else {
        let t = x / 500;
        yInViewbox = 190 + (180 - 190) * Math.pow(t, 0.8); 
      }
      const forestHeight = height * 0.3;
      const rootedYInViewbox = yInViewbox + 35; 
      const yPixelsFromBottom = (250 - rootedYInViewbox) * (forestHeight / 250);
      return yPixelsFromBottom;
    }

    function groundElements() {
      if (!cabinNode || !trekkerNode || !flagNode) return;
      cabinNode.style.bottom = getYOnForest(0.15) + 'px';
      trekkerNode.style.bottom = getYOnForest(0.50) + 'px';
      flagNode.style.bottom = getYOnForest(0.85) + 'px';
    }
    
    window.addEventListener('resize', resize);
    resize();

    class MistParticle {
      constructor() {
        this.active = false;
      }
      
      reset(clusterOriginX, clusterOriginY, isClusterMember = false) {
        this.active = true;
        const spawnXRange = [1000, 1100];
        const randomX = spawnXRange[0] + Math.random() * (spawnXRange[1] - spawnXRange[0]);
        const randomY = 180 + (randomX - 800) * 0.5;
        const baseViewX = isClusterMember ? clusterOriginX : randomX;
        const baseViewY = isClusterMember ? clusterOriginY : randomY;
        const windScaleFactor = (windIntensity / MAX_WIND_VAL);
        const spreadX = isGusting ? (Math.random() - 0.5) * (45 * windScaleFactor) : (Math.random() - 0.5) * 15;
        const spreadY = isGusting ? (Math.random() - 0.5) * (25 * windScaleFactor) : (Math.random() - 0.5) * 10;
        this.x = svgOffsetX + (baseViewX * svgScaleX) + spreadX;
        this.y = svgOffsetY + (baseViewY * svgScaleY) + spreadY;
        this.size = (Math.random() * 2.5 + 0.5) * (1 + (windScaleFactor - 0.5)); 
        this.baseSpeed = Math.random() * MAX_PARTICLE_SPEED; 
        this.life = 0;
        this.maxLife = Math.random() * 1.8 + 1.2;
        this.transitionPoint = 0.15 + Math.random() * 0.1; 
        this.angle = Math.random() * Math.PI * 2;
        this.angleSpeed = (Math.random() - 0.5) * 0.1;
        this.customFallAngle = (9 + Math.random() * 9) * (Math.PI / 180);
        const colors = ['rgba(255, 235, 230, ', 'rgba(255, 255, 255, ', 'rgba(240, 240, 255, '];
        this.baseColor = colors[Math.floor(Math.random() * colors.length)];
      }
      
      update() {
        if (!this.active) return;
        const lifeFactor = this.life / this.maxLife;
        let vx, vy;
        if (lifeFactor < this.transitionPoint) {
          const liftAngle = -(9 + Math.random() * 2) * (Math.PI / 180);
          vx = Math.cos(liftAngle) * this.baseSpeed * windIntensity;
          vy = Math.sin(liftAngle) * this.baseSpeed * windIntensity;
        } else {
          const fallAngle = this.customFallAngle;
          vx = Math.abs(Math.cos(fallAngle)) * (this.baseSpeed * 0.9) * windIntensity;
          vy = Math.abs(Math.sin(fallAngle)) * (this.baseSpeed * 0.9) * windIntensity;
          vx += Math.abs(Math.cos(this.angle)) * 0.15;
          vy += Math.sin(this.angle) * 0.15;
        }
        this.angle += this.angleSpeed;
        this.x += vx;
        this.y += vy;
        this.life += 0.008;
        if (this.life >= this.maxLife || this.x > width + 50 || this.y > height + 50) {
          this.active = false;
        }
      }
      
      draw() {
        if (!this.active) return;
        let opacity = 0.45;
        if (this.life < 0.15) opacity = (this.life / 0.15) * 0.45;
        else if (this.life > this.maxLife - 0.6) opacity = ((this.maxLife - this.life) / 0.6) * 0.45;
        if (opacity < 0) opacity = 0;
        ctx.fillStyle = this.baseColor + opacity + ')';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class OrigamiBird {
      constructor(x, y, vx, vy, scale) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.scale = scale;
        this.flapAngle = Math.random() * Math.PI * 2;
        this.flapSpeed = 0.08 + Math.random() * 0.08;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.flapAngle += this.flapSpeed;
      }
      draw() {
        birdsCtx.save();
        birdsCtx.translate(this.x, this.y);
        birdsCtx.scale(this.scale, this.scale);
        birdsCtx.rotate(Math.atan2(this.vy, this.vx) * 0.5);
        const flap = Math.sin(this.flapAngle);
        birdsCtx.fillStyle = 'rgba(255, 230, 220, 0.7)';
        birdsCtx.beginPath();
        birdsCtx.moveTo(0, 0); 
        birdsCtx.lineTo(-8, -6 + flap * 5); 
        birdsCtx.lineTo(-3, 1); 
        birdsCtx.fill();
        birdsCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        birdsCtx.beginPath();
        birdsCtx.moveTo(0, 0);
        birdsCtx.lineTo(2, -4 + flap * 4); 
        birdsCtx.lineTo(-3, 1);
        birdsCtx.fill();
        birdsCtx.restore();
      }
    }
    
    const MAX_PARTICLES = 2000;
    for (let i = 0; i < MAX_PARTICLES; i++) {
      particles.push(new MistParticle());
    }

    function manageFlocks() {
      if (Math.random() < 0.003 && birds.length < 8) {
        const flockSize = Math.floor(Math.random() * 3) + 2;
        const startY = height * 0.1 + Math.random() * height * 0.3;
        const baseVx = BIRD_AVG_SPEED + (Math.random() - 0.5) * 0.5;
        const baseVy = (Math.random() - 0.5) * 0.2;
        const baseScale = 0.4 + Math.random() * 0.4; 
        for (let i = 0; i < flockSize; i++) {
          birds.push(new OrigamiBird(
            -50 - Math.random() * 80,
            startY + (Math.random() - 0.5) * 40,
            baseVx + (Math.random() - 0.5) * 0.1,
            baseVy + (Math.random() - 0.5) * 0.05,
            baseScale * (0.8 + Math.random() * 0.4)
          ));
        }
      }
      birds = birds.filter(b => b.x < width + 100);
    }
    
    function animate() {
      ctx.clearRect(0, 0, width, height);
      birdsCtx.clearRect(0, 0, width, height);
      
      globalTime += 0.01;
      frameCount++;

      updateStars();
      drawStars();
      
      if (frameCount >= nextGustTime) {
          isGusting = true;
          gustDuration = Math.random() * 300 + 150;
          targetWind = MIN_WIND_VAL + Math.random() * (MAX_WIND_VAL - MIN_WIND_VAL) + 0.3;
          nextGustTime = frameCount + gustDuration + Math.random() * 600 + 400;
      }
      
      if (isGusting) {
          gustDuration--;
          if (gustDuration <= 0) {
              isGusting = false;
              targetWind = MIN_WIND_VAL;
          }
      } else {
          targetWind = MIN_WIND_VAL + Math.sin(frameCount * 0.01) * 0.1;
      }
      
      windIntensity += (targetWind - windIntensity) * 0.03;
      
      let spawnQuota = Math.floor(windIntensity * 18);
      
      if (isGusting && Math.random() < 0.4) {
          const windVolumeMultiplier = (windIntensity / MAX_WIND_VAL) * 1.5;
          const clusterSize = Math.floor((15 + Math.floor(Math.random() * 25)) * windVolumeMultiplier);
          const cX = 1000 + Math.random() * 100;
          const cY = 180 + (cX - 800) * 0.5;
          let count = 0;
          for(let i = 0; i < particles.length && count < clusterSize; i++) {
              if (!particles[i].active) {
                  particles[i].reset(cX, cY, true);
                  count++;
              }
          }
          spawnQuota -= count;
      }

      for(let i = 0; i < particles.length && spawnQuota > 0; i++) {
          if (!particles[i].active) {
              particles[i].reset();
              spawnQuota--;
          }
      }

      for(let i = 0; i < particles.length; i++) {
        if (particles[i].active) {
            particles[i].update();
            particles[i].draw();
        }
      }

      manageFlocks();
      for(let i = 0; i < birds.length; i++) {
        birds[i].update();
        birds[i].draw();
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
  })();
</script>
